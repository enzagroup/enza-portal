  /cards/{cardId}/transactions:
    post:
      operationId: postcardsCardIdTransactions
      tags:
        - Transactions Management
      summary: Show Transactions History
      description: |
        Retrieve detailed transaction history for a card within a specified date range.

        > **⚠️ Note:** This endpoint returns only **Approved** transactions.

        **Date Range:** Specify startDate and endDate to filter transactions
      parameters:
        - $ref: '#/components/parameters/apiKey'
        - name: cardId
          in: path
          required: true
          schema:
            type: string
          description: '**Required.** cardId'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                startDate:
                  type: string
                  format: date-time
                  description: '**Required.** Start date in ISO 8601 format (YYYY-MM-DDTHH:mm:ss)'
                  example: '2025-07-01T00:00:00Z'
                endDate:
                  type: string
                  format: date-time
                  description: '**Required.** End date in ISO 8601 format (YYYY-MM-DDTHH:mm:ss)'
                  example: '2025-10-01T23:59:59Z'
                transactionCount:
                  type: integer
                  minimum: 1
                  maximum: 100
                  description: '**Optional.** Maximum number of transactions to return (1-100)'
                  example: 2
            example:
              startDate: '2025-01-01T00:00:00'
              endDate: '2025-01-31T23:59:59'
              transactionCount: 2
      responses:
        '200':
          description: Transactions successfully retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  cardId:
                    type: string
                    description: Card ID
                    example: '3280'
                  startDate:
                    type: string
                    format: date-time
                    description: Start date of query
                    example: '2025-07-01T00:00:00Z'
                  endDate:
                    type: string
                    format: date-time
                    description: End date of query
                    example: '2025-10-02T23:59:59Z'
                  totalTransactions:
                    type: integer
                    description: Total number of transactions
                    example: 31
                  transactions:
                    type: array
                    items:
                      type: object
                      required:
                        - transactionId
                        - transactionKind
                        - transactionLabel
                        - transactionType
                        - transactionStatus
                        - amount
                        - currency
                        - date
                        - timestamp
                        - terminalOwnerTitle
                        - terminalType
                      properties:
                        transactionId:
                          type: string
                          description: Unique transaction identifier
                          example: '251002511421445346'
                        transactionKind:
                          type: string
                          description: Kind of transaction
                          example: Goods
                        transactionLabel:
                          type: string
                          description: Transaction label
                          example: Purchase
                        transactionType:
                          type: string
                          enum:
                            - Debit
                            - Credit
                            - Neutral
                            - Unknown
                          description: 'Transaction type based on TranSignum: -1 = Debit, 1 = Credit, 0 = Neutral'
                          example: Debit
                        transactionStatus:
                          type: string
                          enum:
                            - Hold
                            - Presentment
                          description: 'Settlement status: Hold (TranPostings empty) or Presentment (TranPostings has data)'
                          example: Presentment
                        amount:
                          type: number
                          description: Transaction amount
                          example: 45
                        currency:
                          type: string
                          description: Currency code
                          example: USD
                        date:
                          type: string
                          format: date-time
                          description: Transaction date
                          example: '2025-10-02T00:00:00Z'
                        timestamp:
                          type: string
                          format: date-time
                          description: Transaction timestamp
                          example: '2025-10-02T14:12:22.000Z'
                        terminalOwnerTitle:
                          type: string
                          description: Terminal owner/acquirer name
                          example: ACQUIRER NAME
                        terminalType:
                          type: string
                          description: Type of terminal
                          example: Pos
                        posting:
                          type: object
                          description: Posting details with RegRole='Current' (only present when transactionStatus is Presentment)
                          properties:
                            sign:
                              type: string
                              enum:
                                - Debit
                                - Credit
                                - Unknown
                              description: 'Posting type: Debit (money out) or Credit (money in)'
                              example: Debit
                            amount:
                              type: number
                              description: Posting amount
                              example: 409.2
                            fees:
                              type: number
                              description: Sum of transaction fees from postings
                              example: 15
                            currency:
                              type: string
                              description: Currency title (e.g., Egyptian Pound, US Dollar)
                              example: Egyptian Pound
                        hold:
                          type: object
                          description: Hold details from TranHoldActions (only present when transactionStatus is Hold)
                          properties:
                            sign:
                              type: string
                              enum:
                                - Debit
                                - Credit
                                - Unknown
                              description: 'Hold type based on HoldSign from Auth action: -1 = Debit, 1 = Credit'
                              example: Debit
                            amount:
                              type: number
                              description: Authorization hold amount (AmtDelta from Auth action)
                              example: 162.56
                            fees:
                              type: number
                              description: Authorization fee amount (AmtDelta from AuthFee action, if present)
                              example: 15
                            currency:
                              type: string
                              description: Currency title (e.g., Egyptian Pound, US Dollar)
                              example: Egyptian Pound
                  meta:
                    $ref: '#/components/schemas/Meta'
                required:
                  - cardId
                  - startDate
                  - endDate
                  - totalTransactions
                  - transactions
              examples:
                successResponse:
                  summary: Successful transactions retrieval
                  value:
                    cardId: '3280'
                    startDate: '2025-07-01'
                    endDate: '2025-10-02'
                    totalTransactions: 2
                    transactions:
                      - transactionId: '251002511421445346'
                        transactionKind: Goods
                        transactionLabel: Purchase
                        transactionType: Debit
                        transactionStatus: Presentment
                        amount: 45
                        currency: USD
                        date: '2025-10-02'
                        timestamp: '2025-10-02T14:12:22.000'
                        terminalOwnerTitle: ACQUIRER NAME
                        terminalType: Pos
                        posting:
                          sign: Debit
                          amount: 409.2
                          fees: 15
                          currency: Egyptian Pound
                      - transactionId: '250925476227641819'
                        transactionKind: Goods
                        transactionLabel: Purchase
                        transactionType: Debit
                        transactionStatus: Hold
                        amount: 21
                        currency: USD
                        date: '2025-09-25'
                        timestamp: '2025-09-25T13:13:42.000'
                        terminalOwnerTitle: ACQUIRER NAME
                        terminalType: Pos
                        hold:
                          sign: Debit
                          amount: 162.56
                          fees: 15
                          currency: Egyptian Pound
                    meta:
                      requestId: '260519453094700226'
                      timestamp: '2026-05-20T09:11:11.566Z'
        '400':
          description: Bad request – validation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
              examples:
                badRequestExample:
                  summary: Invalid date format
                  value:
                    code: ERR_VALIDATION_FAILED
                    message: Invalid startDate format
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          description: Conflict – card not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
              examples:
                conflictExample:
                  summary: Card not found
                  value:
                    code: ERR_CARD_NOT_FOUND
                    message: Card not found
                    meta:
                      requestId: '260519453094700226'
                      timestamp: '2026-05-20T09:11:11.566Z'
        '405':
          $ref: '#/components/responses/MethodNotAllowed'
        '500':
          $ref: '#/components/responses/InternalServerError'
        '504':
          $ref: '#/components/responses/LambdaTimeout'
