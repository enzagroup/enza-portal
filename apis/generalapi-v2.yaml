      summary: Create Supplementary Card
      description: >
        Create a supplementary card for an existing customer.


        **Workflow:**


        1. **Retrieve Authorized Product Types** using `GET /products/retrieve`
           - Select a product from the `allowedProducts` list
           - Pass the product name exactly as returned 

        2. **Create Supplementary Card** using this API (`POST /cards/supplementary`)
           - Provide the customer's `customerId`
           - Provide the `productType` obtained from step 1

        ---


        **Process Flow:**

        1. **Product Selection**: Retrieve authorized product types via `GET /products/retrieve` (must contain SUPP and
        API)

        2. **Card Issuance**: Create issuing contract, issue supplementary card

        3. **Card Details**: Return card ID for further operations


        **Note:** Supplementary cards are linked to existing customer accounts and require special product types
        containing 'SUPP' and 'API'
      parameters:
        - $ref: '#/components/parameters/apiKey'
        - $ref: '#/components/parameters/idempotencyKey'
