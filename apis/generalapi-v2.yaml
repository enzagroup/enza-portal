  /cards/prepaid:
    post:
      operationId: postcardsPrepaid
      tags:
        - Card Issuance
      summary: Create Virtual Prepaid Card
      description: |
        Create a virtual prepaid card for an **existing customer only**.

        ## ⚠️ Important: Customer Must Exist First

        **This API only works for existing customers.** If the customer doesn't exist, you will receive an error.

        **Workflow:**

        1. **Check if Customer Exists** using `POST /customers/search`
           - Search by nationalId, passport, or identityId
           - The response returns `customerId` if the customer exists
           - If customer **does NOT exist** → Use `POST /customers` to create the customer first
           - If customer **exists** → Proceed to step 2 with the returned `customerId`

        2. **Retrieve Authorized Product Types** using `GET /products/retrieve`
           - Select a product from the `allowedProducts` list
           - Pass the product name exactly as returned

        3. **Create Prepaid Card** using this API (`POST /cards/prepaid`)
           - Provide the customer's `customerId`
           - Provide the `productType` obtained from step 2
           - Optionally enable auto-activation

        ---

        **Process Flow:**
        1. **Customer Verification**: Check if customer exists using `customerId`
        2. **Product Selection**: Retrieve authorized product types via `GET /products/retrieve`
        3. **Card Issuance**: Create issuing and financial contracts, issue virtual card
        4. **Card Activation** (Optional): Set `autoActivate: true` to automatically activate the card (default: false)
        5. **Notifications**: Use `POST /v1/notification/manage` after card creation if notifications are required

        **Note:** By default, card is NOT automatically activated unless `autoActivate` is set to `true`
      parameters:
        - $ref: '#/components/parameters/apiKey'
        - $ref: '#/components/parameters/idempotencyKey'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
                - productType
                - customerId
              properties:
                productType:
                  type: string
                  description: '**Required.** Product type for the prepaid card (e.g., VisaPrepaidClassicVirtualAPI)'
                  example: VisaPrepaidClassicVirtualAPI
                customerId:
                  type: string
                  description: '**Required.** The unique identifier of the customer. Obtain from `POST /customers` or `POST /customers/search`.'
                  example: 123456789
            examples:
              createPrepaidCard:
                summary: Create prepaid card for an existing customer
                value:
                  productType: VisaPrepaidClassicVirtualAPI
                  customerId: 123456789
      responses:
        '201':
          description: Card successfully created
          content:
            application/json:
              schema:
                type: object
                properties:
                  personId:
                    type: string
                    description: Customer person ID
                    example: PERS12345
                  cardId:
                    type: string
                    description: Card ID
                    example: '12345'
                  cardDetails:
                    type: object
                    required:
                      - pan
                      - expirationDate
                      - cvv2
                    properties:
                      pan:
                        type: string
                        description: Primary Account Number
                        example: '1234567890123456'
                      expirationDate:
                        type: string
                        format: date
                        description: Card expiration date in YYYY-MM-DD format
                        example: '2027-12-31'
                      cvv2:
                        type: string
                        description: Card verification value
                        example: '123'
                  meta:
                    $ref: '#/components/schemas/Meta'
                required:
                  - personId
                  - cardId
                  - cardDetails
              examples:
                successResponse:
                  summary: Card created successfully
                  value:
                    personId: PERS12345
                    cardId: '12345'
                    cardDetails:
                      pan: '1234567890123456'
                      expirationDate: 2027-12-31T00:00:00.000Z
                      cvv2: '123'
                    meta:
                      requestId: '260519453094700226'
                      timestamp: '2026-05-20T09:11:11.566Z'
        '400':
          description: Bad request – validation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
              examples:
