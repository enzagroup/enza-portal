  /cards/{cardId}/top-ups:
    post:
      operationId: postcardsCardIdTopUps
      summary: Top Up Card
      description: >-
        Load funds instantly onto a card. This operation credits the specified amount to the card's available balance,
        enabling immediate use for transactions.
      tags:
        - Card Control
      parameters:
        - $ref: '#/components/parameters/apiKey'
        - $ref: '#/components/parameters/idempotencyKey'
