  /cards/cvv2/verifications:
    post:
      operationId: postcardsCvv2Verifications
      summary: Verify CVV2 for Card
      description: |
        Validate a customer-entered CVV2/CVC2 for a card. 
        Confirms card possession in card-not-present flows (e.g., onboarding, step-up verification, add-card).
        This API is validation-only. It does not return CVV2 to the client and does not modify any counters/state.
      tags:
        - Card Control
      parameters:
        - $ref: '#/components/parameters/apiKey'
      requestBody:
        description: CVV2 verification request containing cardId and cvv2 to validate.
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                cardId:
                  type: string
                  description: '**Required.** Target Card ID to be validated (numeric only, 1-20 digits)'
                  example: '3132'
                cvv2:
                  type: string
                  description: '**Required.** 3-4 digit CVV2 entered by customer'
                  example: '147'
            example:
              cardId: '3132'
              cvv2: '147'
      responses:
        '200':
          description: CVV2 verification result
          content:
            application/json:
              schema:
                type: object
                properties:
                  isMatched:
                    type: boolean
                    description: True if calculated CVV2 equals input
                    example: true
                  message:
                    type: string
                    example: CVV2 verified
                  meta:
                    $ref: '#/components/schemas/Meta'
                required:
                  - isMatched
                  - message
              examples:
                successMatch:
                  summary: CVV2 Verified (Match)
                  value:
                    isMatched: true
                    message: CVV2 verified
                    meta:
                      requestId: '260519453094700226'
                      timestamp: '2026-05-20T09:11:11.566Z'
                mismatch:
                  summary: CVV2 Mismatch
                  value:
                    isMatched: false
                    message: Invalid CVV2
                    meta:
                      requestId: '260519453094700226'
                      timestamp: '2026-05-20T09:11:11.566Z'
        '400':
          description: Bad request – validation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
              examples:
                missingCardId:
                  summary: Missing cardId
                  value:
                    code: ERR_VALIDATION_FAILED
                    message: 'Missing required field: cardId'
                invalidCvv2Format:
                  summary: Invalid CVV2 format
                  value:
                    code: ERR_VALIDATION_FAILED
                    message: Format error. Provide a 3-4 digit CVV2
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: Conflict – card not found, inactive, or data incomplete
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
              examples:
                cardNotFound:
