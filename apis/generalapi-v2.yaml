              examples:
                primaryCustomerNotFound:
                  summary: Primary customer not found
                  value:
                    code: ERR_CUSTOMER_NOT_FOUND
                    message: Primary customer not found
                    meta:
                      requestId: '260519453094700226'
                      timestamp: '2026-05-20T09:11:11.566Z'
                secondaryCustomerNotFound:
                  summary: Secondary customer not found
                  value:
                    code: ERR_CUSTOMER_NOT_FOUND
                    message: Secondary customer not found
                    meta:
                      requestId: '260519453094700226'
                      timestamp: '2026-05-20T09:11:11.566Z'
        '405':
          $ref: '#/components/responses/MethodNotAllowed'
        '409':
