                  description: >-
                    **Required.** Issuing product. Obtain via `GET /products/retrieve`. Must contain SUPP and API for
                    supplementary cards.
                  example: GTBGH2-PHY-VS-PRP-CLS-NOR-CUS-SUPP-CardsIssuingContractAPI
                customerId:
                  type: string
                  description: '**Required.** The unique identifier of the customer. Obtain from `POST /customers` or `POST /customers/search`.'
                  example: 123456789
            examples:
