  /notifications/preferences:
    post:
      operationId: postnotificationsPreferences
      summary: Manage Notification Service
      description: >
        Enable notification service for a customer by specifying which service to be active.


        **How It Works:**

        1. **Customer Verification**: Verifies customer existence using `customerId`

        2. **Service Activation**: Specifies which notification service to be active

        3. **Exclusive Behavior**: Activates **only** what is sent and automatically suspends any other notification
        service



        > **Note:** To check currently active notification services before making changes, refer to the [POST
        /notification/status] endpoint.
      tags:
        - Notifications Management
      parameters:
        - $ref: '#/components/parameters/apiKey'
        - $ref: '#/components/parameters/idempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - customerId
                - channel
              properties:
                customerId:
                  type: string
                  description: The unique identifier of the customer. Obtain from `POST /customers` or `POST /customers/search`.
                  example: 123456789
                channel:
                  type: string
                  description: |
                    **Required.** Notification channel(s) to activate.

                    ⚠️ **IMPORTANT:** Requesting a channel will replace/suspend any existing notification configuration.
                    - To activate Email only: send `email` (this will suspend SMS if active)
                    - To activate SMS only: send `sms` (this will suspend Email if active)
                    - To activate BOTH channels: send `sms,email` (comma-separated, no spaces)
                  example: sms,email
                status:
                  type: string
                  enum:
                    - Active
                    - Suspend
                  description: '**Optional.** Service status: Active or Suspend (default: Active)'
                  example: Active
            examples:
              createSMSService:
                summary: Create SMS notification service
                value:
                  customerId: 123456789
                  channel: sms
                  status: Active
              suspendEmailService:
                summary: Suspend email notification service
                value:
                  customerId: 123456789
                  channel: email
                  status: Suspend
              createSMSEmailService:
                summary: Create SMS and Email notification service
                value:
                  customerId: 123456789
                  channel: sms,email
      responses:
        '201':
          description: Notification service created/updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Notification service enabled successfully
                  meta:
                    $ref: '#/components/schemas/Meta'
              examples:
                successEnabled:
                  summary: Notification service enabled successfully
                  value:
                    message: Notification service enabled successfully
                    meta:
                      requestId: '260519453094700226'
                      timestamp: '2026-05-20T09:11:11.566Z'
                successSuspended:
                  summary: Notification service suspended successfully
                  value:
                    message: Notification service suspended successfully
                    meta:
                      requestId: '260519453094700226'
                      timestamp: '2026-05-20T09:11:11.566Z'
                successReplaced:
                  summary: Notification service replaced successfully
                  value:
                    message: Notification service updated successfully. Your notification channel is now {channel}.
                    meta:
                      requestId: '260519453094700226'
                      timestamp: '2026-05-20T09:11:11.566Z'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
              examples:
                missingField:
                  summary: Missing required field
                  value:
                    code: ERR_VALIDATION_FAILED
                    message: 'Missing required field: channel'
                invalidChannel:
                  summary: Invalid channel
                  value:
                    code: ERR_VALIDATION_FAILED
                    message: 'Invalid channel. Valid values are: sms, email, sms_and_email'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          description: Customer not found
          content:
