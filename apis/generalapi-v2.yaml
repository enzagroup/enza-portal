  /cards/{cardId}/top-up-reversals:
    post:
      operationId: postcardsCardIdTopUpReversals
      summary: Reverse Top Up Card
      description: >
        Reverse a previous top-up by deducting funds from the card's available balance and returning them to the bank
        pool account. This operation cancels a top-up transaction.


        **Transaction Flow:**

        1. Validate card existence and status

        2. Verify card has sufficient balance

        3. Execute real-time fund transfer from card to bank pool

        4. Update card balance immediately

        5. Return transaction confirmation with approval code
      tags:
        - Card Control
      parameters:
        - $ref: '#/components/parameters/apiKey'
        - $ref: '#/components/parameters/idempotencyKey'
        - name: cardId
          in: path
          required: true
          schema:
            type: string
          description: '**Required.** cardId'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                ccy:
                  type: string
                  description: '**Required.** Currency code (numeric only, e.g., 936 for GHS)'
                  example: '936'
                amount:
                  type: string
                  description: '**Required.** Amount to reverse (decimal with up to 2 decimal places, must be greater than zero)'
                  example: '100.12'
            example:
              ccy: '936'
              amount: '100.12'
      responses:
        '201':
          description: Reverse top-up successfully completed
          content:
            application/json:
              schema:
                type: object
                properties:
                  transactionId:
                    type: string
                    description: Transaction ID
                    example: '251218316432285040'
                  approvalCode:
                    type: string
                    description: Transaction approval code
                    example: BLQP9Y
                  amount:
                    type: string
                    description: Reversed amount
                    example: '100.12'
                  currency:
                    type: string
                    description: Currency code
                    example: '936'
                  meta:
                    $ref: '#/components/schemas/Meta'
                required:
                  - transactionId
                  - approvalCode
                  - amount
                  - currency
              examples:
                successResponse:
                  summary: Reverse top-up completed successfully
                  value:
                    message: Successfully reversed the top-up
                    meta:
                      requestId: '260519453094700226'
                      timestamp: '2026-05-20T09:11:11.566Z'
        '400':
          description: Bad request – validation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
              examples:
                invalidCardId:
                  summary: Invalid card ID format
                  value:
                    code: ERR_VALIDATION_FAILED
                    message: Invalid cardId format. Card ID must contain only numbers (0-9) and be up to 19 digits long
                invalidCurrency:
                  summary: Invalid currency code format
                  value:
                    code: ERR_VALIDATION_FAILED
                    message: Currency code must contain only numbers
                invalidAmount:
                  summary: Invalid amount format
                  value:
                    code: ERR_VALIDATION_FAILED
                    message: Amount must be a valid number with up to 2 decimal places
                zeroOrNegativeAmount:
                  summary: Zero or negative amount
                  value:
                    code: ERR_INVALID_AMOUNT
                    message: Amount must be greater than zero.
                missingField:
                  summary: Missing required field
                  value:
                    code: ERR_VALIDATION_FAILED
                    message: Card ID is required
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          description: Conflict – reverse top-up declined
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
              examples:
                cardNotFound:
                  summary: Card not found
                  value:
                    code: ERR_CARD_NOT_FOUND
                    message: Card not found
                    meta:
                      requestId: '260519453094700226'
                      timestamp: '2026-05-20T09:11:11.566Z'
                accountNotFound:
                  summary: Account not found
                  value:
                    code: ERR_ACCOUNT_NOT_FOUND
                    message: Account number not found
                    meta:
                      requestId: '260519453094700226'
                      timestamp: '2026-05-20T09:11:11.566Z'
