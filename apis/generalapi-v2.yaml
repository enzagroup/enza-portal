  /cards/debit:
    post:
      operationId: postcardsDebit
      tags:
        - Card Issuance
      summary: Create Debit Card
      description: >
        Create a debit card for an existing customer.


        Use `isJointAccount` to choose the flow:


        - **`isJointAccount = false` (Individual)** — issues a debit card on a new account. If the account already has a
        debit card, the request is rejected.

        - **`isJointAccount = true` (Joint)** — issues a debit card on a joint account. If the joint account already
        exists, the card is linked to it; otherwise the joint account is created and the card is linked.


        **Prerequisites:** the customer must already exist. Use `POST /customers/search` to verify and obtain
        `customerId`; if not found, create via `POST /customers`. Get a valid `productType` from `GET /products/retrieve`.
      parameters:
        - $ref: '#/components/parameters/apiKey'
        - $ref: '#/components/parameters/idempotencyKey'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
                - productType
                - customerId
                - accountNumber
              properties:
                productType:
                  type: string
                  description: >-
                    **Required.** Issuing product. Obtain via `GET /products/retrieve`. Pass the product name exactly as
                    returned (including API suffix).
                  example: VisaDebitPhysicalAPI
                customerId:
                  type: string
                  description: '**Required.** The unique identifier of the customer. Obtain from `POST /customers` or `POST /customers/search`.'
                  example: 123456789
                accountNumber:
                  type: string
                  description: '**Required.** External account number (DHI reference) to link with the financial contract'
                  example: DHI123456789
                isJointAccount:
                  type: boolean
                  description: >-
                    **Optional.** Set to `true` to issue the card on a joint account. Set to `false` (default) for an
                    individual account.
                  default: false
                  example: false
            examples:
              individualDebit:
                summary: Individual account — create debit card
                value:
                  productType: VisaDebitPhysicalAPI
                  customerId: 123456789
                  accountNumber: DHI123456789
                  isJointAccount: false
              jointAccount:
                summary: Joint account — create debit card linked to a joint financial contract
                value:
                  productType: VisaDebitPhysicalAPI
                  customerId: 123456789
                  accountNumber: DHI123456789
                  isJointAccount: true
      responses:
