  /accounts/status-change-requests:
    post:
      operationId: postaccountsStatusChangeRequests
      summary: Change Account Status
      description: |
        Change the status of an existing account.
      tags:
        - Account Management
      parameters:
        - $ref: '#/components/parameters/apiKey'
        - $ref: '#/components/parameters/idempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                accountNumber:
                  type: string
                  description: Account number
                  example: '100000000001336'
                status:
                  type: string
                  enum:
                    - ACTIVE
                    - SUSPENDED
                    - CLOSURE_INITIATED
                    - CLOSED
                    - FORCE_CLOSED
                  description: >
                    New account status:

                    - ACTIVE: Account is open and usable for normal operations

                    - SUSPENDED: Account is temporarily restricted (limited/blocked operations)

                    - CLOSURE_INITIATED: Closure process has started (final settlement / pending closure window)

                    - CLOSED: Account is closed normally (standard closure path)

                    - FORCE_CLOSED: Account is closed via forced closure flow (operational override / immediate
                    finalize)
                  example: SUSPENDED
                window:
                  type: integer
                  description: >
                    **Optional.** The number of days the account remains in a pending closure state before it is fully
                    closed. During this window, final settlements are processed and any remaining transactions are
                    completed.

                    - Default: 14 days (two weeks)

                    - Only applicable when status is `CLOSURE_INITIATED`

                    - After the window expires, the account transitions to `CLOSED`
                  default: 14
                  example: 14
            examples:
              suspendAccount:
                summary: Suspend an active account
                value:
                  accountNumber: '100000000001336'
                  status: SUSPENDED
              activateAccount:
                summary: Activate a suspended account
                value:
                  accountNumber: '100000000001336'
                  status: ACTIVE
              prepareForClosure:
                summary: Prepare account for closure
                value:
                  accountNumber: '100000000001336'
                  status: CLOSURE_INITIATED
                  window: 14
              closeAccount:
                summary: Close account (from prepared for closure)
                value:
                  accountNumber: '100000000001336'
                  status: CLOSED
              forceCloseAccount:
                summary: Force close account (operational override)
                value:
                  accountNumber: '100000000001336'
                  status: FORCE_CLOSED
      responses:
        '201':
          description: Account status changed successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Account suspended successfully
                  meta:
                    $ref: '#/components/schemas/Meta'
              examples:
                success:
                  summary: Status changed successfully
                  value:
                    message: Account suspended successfully
                    meta:
                      requestId: '260519453094700226'
                      timestamp: '2026-05-20T09:11:11.566Z'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
              examples:
                invalidStatus:
                  summary: Invalid status value
                  value:
                    code: ERR_VALIDATION_FAILED
                    message: 'Invalid status value. Must be one of: A (Active), S (Suspended), F (Closure Initiated), C (Closed)'
