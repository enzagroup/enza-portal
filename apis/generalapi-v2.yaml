      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                ccy:
                  type: string
                  description: '**Required.** Currency code (numeric only, e.g., 936 for GHS)'
                  example: '936'
                amount:
                  type: string
                  description: '**Required.** Amount to top up (decimal with up to 2 decimal places)'
                  example: '100.12'
            example:
              ccy: '936'
              amount: '100.12'
