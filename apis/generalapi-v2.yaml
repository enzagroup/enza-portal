  /cards/account-links:
    post:
      operationId: postcardsAccountLinks
      summary: Link Card to Account
      description: >
        Link a card to an account with flexible linking modes. This operation establishes a relationship between a card
        and an account, enabling specific transaction capabilities.


        **Linking Modes:**


        - **Access**: Card can authorize transactions on the account (authorization flow)

        - **Charge**: Card can be charged fees from the account

        - **Access,Charge**: Both authorization and charging capabilities


        **Validation Flow:**


        1. Verify card status is "New" or "Active"

        2. Verify card contract status is "Active"

        3. Verify target account status is "Active"

        4. Execute linking operation if all validations pass


        **Common Use Cases:**


        - Link a card to an account for transaction authorization

        - Link a card to an account for fee charging

        - Enable both authorization and fee charging on a single account
      tags:
        - Card Issuance
      parameters:
        - $ref: '#/components/parameters/apiKey'
        - $ref: '#/components/parameters/idempotencyKey'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                cardId:
                  type: string
                  description: '**Required.** Card ID to link'
                  example: '6426'
                accountNumber:
                  type: string
                  description: '**Required.** Account Number to link to (e.g., ACC01, ACC02)'
                  example: ACC01
                kindOfLinking:
                  type: string
                  description: '**Required.** Type of linking - Access | Charge | Access,Charge'
                  enum:
                    - Access
                    - Charge
                    - Access,Charge
                  example: Access
            examples:
              accessOnly:
                summary: Link for Authorization Only
                value:
                  cardId: '6426'
                  accountNumber: ACC01
                  kindOfLinking: Access
              chargeOnly:
                summary: Link for Fee Charging Only
                value:
                  cardId: '6426'
                  accountNumber: ACC01
                  kindOfLinking: Charge
              both:
                summary: Link for Both Authorization and Charging
                value:
                  cardId: '6426'
                  accountNumber: ACC01
                  kindOfLinking: Access,Charge
              chargeAccess:
                summary: Link for Both (Reversed Order)
                value:
                  cardId: '6426'
                  accountNumber: ACC01
                  kindOfLinking: Charge,Access
      responses:
        '201':
          description: Card successfully linked to account
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Card successfully linked to account
                  cardId:
                    type: string
                    example: '6426'
                  accountNumber:
                    type: string
                    example: ACC01
                  kindOfLinking:
                    type: string
                    example: Access
                  transactionId:
                    type: string
                    example: '260127344883815956'
                  approvalCode:
                    type: string
                    example: A8B8GD
                  meta:
                    $ref: '#/components/schemas/Meta'
                required:
                  - message
                  - cardId
                  - accountNumber
                  - kindOfLinking
                  - transactionId
                  - approvalCode
              examples:
                successAccess:
                  summary: Access Link Success
                  value:
                    message: Card successfully linked to account
                    cardId: '6426'
                    accountNumber: ACC01
                    kindOfLinking: Access
                    transactionId: '260127344883815956'
                    approvalCode: A8B8GD
                    meta:
                      requestId: '260519453094700226'
                      timestamp: '2026-05-20T09:11:11.566Z'
                successCharge:
                  summary: Charge Link Success
                  value:
                    message: Card successfully linked to account
                    cardId: '6426'
                    accountNumber: ACC01
