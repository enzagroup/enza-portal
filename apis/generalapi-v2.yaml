  /cards/{cardId}/limits:
    get:
      operationId: getcardsCardIdLimits
      summary: Retrieve Card Limits
      description: |
        Retrieve the list of limits and restrictions configured on a card/token.
                
        **Pre-requisite:** The target CardID must exist.
      tags:
        - Limits Management
      parameters:
        - $ref: '#/components/parameters/apiKey'
        - name: cardId
          in: path
          required: true
          description: '**Required.** Card ID (numeric string)'
          schema:
            type: string
          example: '3657'
      responses:
        '200':
          description: Card limits successfully retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  cardId:
                    type: string
                    description: Card ID
                    example: '3657'
                  totalLimits:
                    type: integer
                    description: Total number of limits configured
                    example: 3
                  limits:
                    type: array
                    items:
                      type: object
                      required:
                        - limitTitle
                        - limitRid
                        - inUse
                        - maxVal
                        - ccy
                        - accumulatorValue
                        - resetPeriodType
                        - accumulateCnt
                        - customerDescription
                        - limitType
                      properties:
                        limitTitle:
                          type: string
                          description: Limit title in Enza system
                          example: Daily ATM Withdrawal Limit
                        limitRid:
                          type: string
                          description: Limit reference ID to be used by the bank in the next APIs like usage and change limit value
                          example: ATM_DAILY_LIMIT
                        inUse:
                          type: boolean
                          description: True if limit is active, false if not
                          example: true
                        maxVal:
                          type: number
                          description: Maximum limit value
                          example: 5000
                        ccy:
                          type: string
                          description: ISO currency code - Limit Currency (empty for count limits)
                          example: EGP
                        accumulatorValue:
                          type: number
                          description: Current usage amount
                          example: 1200
                        resetPeriodType:
                          type: string
                          enum:
                            - Day
                            - Week
                            - Month
                            - Year
                            - ''
                          description: 'Limit reset period: Day, Week, Month, Year, or empty string'
                          example: Day
                        accumulateCnt:
                          type: integer
                          description: If the limit type is count
                          example: 0
                        customerDescription:
                          type: string
                          description: Limit title bank can show it to the customer
                          example: Daily ATM cash withdrawal limit
                        limitType:
                          type: string
                          enum:
                            - Amount
                            - Count
                            - Restriction
                          description: Type of limit
                          example: Amount
                  meta:
                    $ref: '#/components/schemas/Meta'
                required:
                  - cardId
                  - totalLimits
                  - limits
              examples:
                successResponse:
                  summary: Limits retrieved successfully
                  value:
                    cardId: '3657'
                    totalLimits: 3
                    limits:
                      - limitTitle: Daily ATM Withdrawal Limit
                        limitRid: ATM_DAILY_LIMIT
                        inUse: true
                        maxVal: 5000
                        ccy: EGP
                        accumulatorValue: 1200
                        resetPeriodType: Day
                        accumulateCnt: 0
                        customerDescription: Daily ATM cash withdrawal limit
                        limitType: Amount
                    meta:
                      requestId: '260519453094700226'
                      timestamp: '2026-05-20T09:11:11.566Z'
        '400':
          description: Bad request – validation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
              examples:
                missingField:
                  summary: Missing required field
                  value:
                    code: ERR_VALIDATION_FAILED
                    message: 'Missing required field: cardId'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          description: Conflict – card not found
          content:
