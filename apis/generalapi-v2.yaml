  /holds/debits:
    post:
      tags:
        - Holds Management
      parameters:
        - $ref: '#/components/parameters/apiKey'
        - $ref: '#/components/parameters/idempotencyKey'
      operationId: postholdsDebits
      summary: Create Debit Hold
      description: |
        Place a manual hold amount on a debit account using the Account Number.
        The hold amount will reduce the available balance and prevent the customer from using the held amount.
        The hold remains blocked until the defined CloseTime is reached or the hold is released manually.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                accountNumber:
                  type: string
                  description: '**Required.** Target account number (contract RID) to place hold on - numeric only, 1-20 digits'
                  example: '100000000001488'
                amount:
                  type: number
                  description: '**Required.** Hold amount - must be positive (minimum 0.01)'
                  example: 10
                ccy:
                  type: string
                  description: '**Required.** Currency code (ISO 3166-1 numeric, 3 digits, e.g., 840 for USD)'
                  example: '840'
                closeTime:
                  type: string
                  description: >-
                    **Required.** Hold expiry date/time in ISO 8601 format without milliseconds. Examples:
                    2025-02-18T00:00:00 (start of Feb 18), 2025-02-19T23:59:59 (last second of Feb 19)
                  example: '2025-02-18T00:00:00Z'
            example:
              accountNumber: '100000000001488'
              amount: 10
              ccy: '840'
              closeTime: '2025-02-18T00:00:00'
      responses:
        '201':
          description: Debit hold created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Debit hold created successfully
                  holdId:
                    type: string
                    description: Unique hold reference ID
                    example: '10516'
                  holdType:
                    type: string
                    example: DEBIT
                  accountNumber:
                    type: string
                    example: '100000000001488'
                  amount:
                    type: number
                    example: 10
                  ccy:
                    type: string
                    example: '840'
                  closeTime:
                    type: string
                    example: '2025-02-18T00:00:00Z'
                  meta:
                    $ref: '#/components/schemas/Meta'
              examples:
                success:
                  summary: Debit hold created successfully
                  value:
                    message: Debit hold created successfully
                    holdId: '10516'
                    meta:
                      requestId: '260519453094700226'
                      timestamp: '2026-05-20T09:11:11.566Z'
        '400':
          $ref: '#/components/responses/BadRequest'
