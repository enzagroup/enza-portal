                    description: Transaction approval code
                    example: 6Q212F
                  amount:
                    type: string
                    description: Top-up amount
                    example: '100.12'
                  currency:
                    type: string
                    description: Currency code
                    example: '936'
                  meta:
                    $ref: '#/components/schemas/Meta'
